# GhostOffice - Tox Configuration
# Multi-version testing across Python versions

[tox]
envlist = py38,py39,py310,py311,py312
isolated_build = True

[testenv]
deps =
    pytest>=7.0
    pytest-cov>=4.0
    pytest-asyncio>=0.21
    -rrequirements.txt

commands =
    pytest Tests/ -v --cov=. --cov-report=term-missing
    ruff check .

[testenv:py312]
deps =
    {[testenv]deps}
    mypy
    types-requests
    types-python-dateutil

commands =
    {posargs:pytest Tests/ -v}
    mypy Core/ Security/ --ignore-missing-imports

[testenv:lint]
deps =
    ruff
    black
    isort

commands =
    ruff check .
    ruff format --check .
    isort --check .

[testenv:security]
deps =
    bandit
    safety

commands =
    bandit -r Core/ Security/ Modules/ -x B413
    safety check --file requirements.txt

[testenv:typing]
deps =
    mypy
    types-requests

commands =
    mypy Core/ --ignore-missing-imports --no-error-summary
    mypy Security/ --ignore-missing-imports --no-error-summary

[flake8]
max-line-length = 100
exclude = .git,__pycache__,venv,.eggs

[pycodestyle]
max-line-length = 100

[isort]
profile = black
line_length = 100
skip_gitignore = true

[tool:pytest]
testpaths = Tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

[coverage:run]
source = .
omit =
    venv/*
    Tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
exclude =
    venv/
    Tests/
    */migrations/
show_missing = True
skip_covered = False